name: Update data.json

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh projects and articles
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: duthaho
          BLOG_URL: https://duthaho.dev/
        run: node scripts/update-data.mjs

      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet data.json; then
            echo "No changes."
            exit 0
          fi
          changes=$(git diff --numstat data.json | awk '{print $1+$2}')
          if [ "${changes:-0}" -gt 200 ]; then
            echo "::error::Diff too large (${changes} lines). Refusing to auto-commit."
            git --no-pager diff data.json
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: weekly auto-update of projects and articles"
          git push
