<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résumé — Duong Thanh Hop, Solution Architect</title>
    <meta name="description" content="Résumé of Duong Thanh Hop (@duthaho) — Solution Architect, Da Nang, Vietnam.">
    <link href="favicon.ico" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tokens.css">
    <style>
    /* Hallmark · genre: modern-minimal · theme: Cobalt · design-system: tokens.css
     * page-type: content/résumé (print-first) · shares the about page's system
     * Hallmark · pre-emit critique: P5 H4 E5 S5 R5 V4
     */

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
        background: var(--color-paper-2);
        font-family: var(--font-body);
        color: var(--color-ink-2);
        font-size: 10.5pt;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        /* keep the one cobalt signal (ticks, rail nodes) when saved to PDF */
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
    a { color: var(--color-accent-2); text-decoration: none; }
    :focus-visible { outline: 2px solid var(--color-focus); outline-offset: 2px; border-radius: 3px; }

    /* -------- Toolbar (screen only) -------- */
    .toolbar {
        position: sticky;
        top: 0;
        z-index: var(--z-nav);
        background: color-mix(in oklab, var(--color-paper) 85%, transparent);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--color-rule);
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.6rem 1.1rem;
    }
    .toolbar a, .toolbar button {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-family: var(--font-body);
        font-size: 0.8125rem;
        font-weight: 500;
        line-height: 1;
        color: var(--color-ink);
        background: var(--color-paper);
        border: 1px solid var(--color-rule-strong);
        border-radius: var(--radius-control);
        padding: 0.5rem 0.8rem;
        cursor: pointer;
        transition: border-color var(--dur-short) var(--ease-out),
                    background-color var(--dur-short) var(--ease-out);
    }
    .toolbar a:hover, .toolbar button:hover { border-color: var(--color-ink); }
    .toolbar .primary {
        background: var(--color-accent-btn);
        color: var(--color-accent-ink);
        border-color: transparent;
    }
    .toolbar .primary:hover { background: var(--color-accent-btn-2); border-color: transparent; }
    .toolbar .hint {
        margin-left: auto;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        color: var(--color-ink-3);
    }

    /* -------- Sheet -------- */
    .page {
        max-width: 210mm;
        margin: 24px auto 48px;
        background: var(--color-paper);
        border: 1px solid var(--color-rule);
        border-radius: 4px;
        box-shadow: 0 8px 40px var(--color-shadow);
        padding: 16mm 17mm;
    }

    /* -------- Header -------- */
    .head {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 16px;
        flex-wrap: wrap;
        border-bottom: 1px solid var(--color-rule-strong);
        padding-bottom: 12px;
        margin-bottom: 16px;
    }
    .head__name {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 25pt;
        letter-spacing: -0.02em;
        line-height: 1.02;
        color: var(--color-ink);
        margin: 0 0 4px;
    }
    .head__role {
        font-family: var(--font-mono);
        font-size: 9pt;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--color-accent);
        margin: 0;
    }
    .head__contact {
        text-align: right;
        font-family: var(--font-mono);
        font-size: 8.5pt;
        color: var(--color-ink-3);
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin: 0;
    }
    .head__contact a { color: var(--color-ink-2); }
    .head__contact a:hover { color: var(--color-accent-2); }

    .head__stats {
        font-family: var(--font-mono);
        font-size: 8.5pt;
        color: var(--color-ink-3);
        margin: 0 0 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 4px 18px;
    }
    .head__stats b {
        color: var(--color-ink);
        font-weight: 600;
        font-variant-numeric: tabular-nums;
    }

    /* -------- Sections -------- */
    .sec { margin-bottom: 15px; break-inside: auto; }
    .sec__title {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 12pt;
        letter-spacing: -0.01em;
        color: var(--color-ink);
        border-bottom: 1px solid var(--color-rule);
        padding-bottom: 4px;
        margin: 0 0 9px;
        break-after: avoid;
    }
    .sec__title::before {
        content: "";
        width: 7px; height: 7px;
        border-radius: 2px;
        background: var(--color-accent);
        flex: none;
    }

    .summary { margin: 0; color: var(--color-ink-2); max-width: 62em; }

    /* Skills */
    .skills { display: flex; flex-direction: column; gap: 6px; }
    .skills__row { display: flex; gap: 12px; }
    .skills__label {
        font-family: var(--font-mono);
        font-size: 8pt;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--color-ink-3);
        min-width: 92px;
        padding-top: 2px;
    }
    .skills__value { font-size: 10pt; color: var(--color-ink); }

    /* Experience — hairline timeline rail with a cobalt node per role.
       The rail + nodes are decorative; every date/role/company is real text,
       so screen readers and ATS parsers read the list in plain source order. */
    .exp {
        position: relative;
        padding-left: 20px;
    }
    .exp::before {
        content: "";
        position: absolute;
        left: 3px;
        top: 5px;
        bottom: 5px;
        width: 1px;
        background: var(--color-rule-strong);
    }
    .job {
        position: relative;
        margin-bottom: 14px;
        break-inside: avoid;
    }
    .job:last-child { margin-bottom: 0; }
    .job::before {
        content: "";
        position: absolute;
        left: -20px;
        top: 0.42em;
        width: 8px;
        height: 8px;
        border-radius: 2px;
        background: var(--color-accent);
        box-shadow: 0 0 0 2.5px var(--color-paper);
    }
    .job__head {
        display: flex;
        align-items: baseline;
        gap: 10px;
        break-after: avoid;
    }
    .job__role {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 11.5pt;
        letter-spacing: -0.01em;
        color: var(--color-ink);
        margin: 0;
    }
    .job__co {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 10.5pt;
        letter-spacing: -0.01em;
        color: var(--color-accent);
    }
    .job__period {
        margin-left: auto;
        font-family: var(--font-mono);
        font-size: 8.5pt;
        color: var(--color-ink-3);
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
    }
    .job__summary { margin: 3px 0 6px; font-size: 9.8pt; color: var(--color-ink-2); }
    .job__bullets { margin: 0; padding: 0; list-style: none; }
    .job__bullets li {
        font-size: 9.8pt;
        line-height: 1.45;
        padding-left: 15px;
        position: relative;
        margin-bottom: 3px;
        color: var(--color-ink-2);
        break-inside: avoid;
    }
    .job__bullets li::before {
        content: "";
        position: absolute;
        left: 0; top: 0.55em;
        width: 5px; height: 5px;
        border-radius: 1px;
        background: var(--color-accent);
    }
    .job__bullets strong { color: var(--color-ink); font-weight: 600; }
    .job__stack {
        font-family: var(--font-mono);
        font-size: 8pt;
        color: var(--color-ink-3);
        margin: 6px 0 0;
    }

    /* Open source & writing */
    .oss { margin: 0; padding: 0; list-style: none; }
    .oss li { margin-bottom: 6px; break-inside: avoid; }
    .oss__name { font-family: var(--font-mono); font-weight: 600; font-size: 9.5pt; color: var(--color-ink); }
    .oss__name:hover { color: var(--color-accent-2); }
    .oss__meta { font-family: var(--font-mono); font-size: 8pt; color: var(--color-ink-3); margin-left: 8px; font-variant-numeric: tabular-nums; }
    .oss__desc { color: var(--color-ink-2); font-size: 9.5pt; }

    /* Selected writing — real articles from data.json, most recent first */
    .writing { margin: 0; padding: 0; list-style: none; }
    .writing li {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 5px;
        break-inside: avoid;
    }
    .writing li:last-child { margin-bottom: 0; }
    .writing__title {
        flex: 1 1 auto;
        color: var(--color-ink);
        font-size: 9.6pt;
        line-height: 1.4;
    }
    .writing__title:hover { color: var(--color-accent-2); }
    .writing__date {
        flex: none;
        font-family: var(--font-mono);
        font-size: 8pt;
        color: var(--color-ink-3);
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
        padding-top: 1px;
    }
    .writing__note {
        margin: 8px 0 0;
        font-size: 9pt;
        color: var(--color-ink-3);
    }

    @media (max-width: 480px) {
        .page { padding: 22px 18px; margin: 14px auto 28px; }
        .head__contact { text-align: left; }
        .toolbar .hint { display: none; }
    }

    /* -------- Print -------- */
    @page { size: A4; margin: 0; }
    @media print {
        body { background: #fff; }
        .toolbar { display: none; }
        .page {
            max-width: none;
            width: 100%;
            margin: 0;
            border: none;
            border-radius: 0;
            box-shadow: none;
            padding: 14mm 16mm;
        }
        a { color: inherit; }
    }

    @media (prefers-reduced-motion: reduce) {
        * { transition-duration: 0ms !important; }
    }
    </style>
</head>
<body>

    <nav class="toolbar" aria-label="Résumé actions">
        <a href="index.html">← Profile</a>
        <button class="primary" type="button" onclick="window.print()">Download PDF</button>
        <span class="hint">Tip: choose “Save as PDF” in the print dialog</span>
    </nav>

    <main class="page" id="page"></main>

    <script>
    (function () {
        'use strict';

        const EMAIL = 'hopit.bkdn@gmail.com';

        function escapeHTML(s) {
            return String(s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        const stripTags = (s) => String(s).replace(/<[^>]+>/g, '');
        const bare = (url) => String(url).replace(/^https?:\/\//, '').replace(/\/$/, '');
        const enDash = (s) => String(s).replace(/\s*-\s*/g, '–');
        const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        function monthYear(iso) {
            const d = new Date(iso);
            return Number.isNaN(d.getTime()) ? '' : `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
        }

        async function init() {
            const res = await fetch('data.json');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const { personal, stats, coreSkills, techStack, experience, projects, articles = [], social } = data;

            document.title = `Résumé — ${personal.name}, ${personal.title}`;

            const contact = [
                `<span>${escapeHTML(personal.location)}</span>`,
                `<a href="mailto:${EMAIL}">${EMAIL}</a>`,
                ...social.map(l => `<a href="${escapeHTML(l.url)}" target="_blank" rel="noopener">${escapeHTML(bare(l.url))}</a>`)
            ].join('');

            const statsLine = stats
                .map(s => `<span><b>${escapeHTML(s.value)}</b> ${escapeHTML(s.label)}</span>`)
                .join('');

            const summary = stripTags(personal.about.paragraphs[0]);

            const jobs = experience.map(job => `
                <article class="job">
                    <div class="job__head">
                        <h3 class="job__role">${escapeHTML(job.title)}</h3>
                        <span class="job__co">${escapeHTML(job.company)}</span>
                        <span class="job__period">${escapeHTML(enDash(job.period))}</span>
                    </div>
                    <p class="job__summary">${escapeHTML(job.summary)}</p>
                    <ul class="job__bullets">
                        ${(job.achievements || []).map(a => `<li>${a}</li>`).join('')}
                    </ul>
                    <p class="job__stack">${(job.stack || []).map(escapeHTML).join(' · ')}</p>
                </article>
            `).join('');

            const oss = projects.slice(0, 3).map(p => {
                const meta = [p.stars ? `${p.stars} stars` : '', p.forks ? `${p.forks} forks` : '']
                    .filter(Boolean).join(' · ');
                return `
                <li>
                    <a class="oss__name" href="${escapeHTML(p.url)}" target="_blank" rel="noopener">${escapeHTML(p.name)}</a>
                    <span class="oss__meta">${escapeHTML(meta)}</span>
                    <span class="oss__desc">— ${escapeHTML(p.description)}</span>
                </li>`;
            }).join('');

            const writing = articles.slice(0, 3).map(a => `
                <li>
                    <a class="writing__title" href="${escapeHTML(a.url)}" target="_blank" rel="noopener">${escapeHTML(a.title)}</a>
                    <span class="writing__date">${escapeHTML(monthYear(a.date))}</span>
                </li>`).join('');

            document.getElementById('page').innerHTML = `
                <header class="head">
                    <div>
                        <h1 class="head__name">${escapeHTML(personal.name)}</h1>
                        <p class="head__role">${escapeHTML(personal.title)}</p>
                    </div>
                    <p class="head__contact">${contact}</p>
                </header>

                <p class="head__stats">${statsLine}</p>

                <section class="sec">
                    <h2 class="sec__title">Summary</h2>
                    <p class="summary">${escapeHTML(summary)}</p>
                </section>

                <section class="sec">
                    <h2 class="sec__title">Skills</h2>
                    <div class="skills">
                        <div class="skills__row">
                            <span class="skills__label">Core</span>
                            <span class="skills__value">${coreSkills.map(s => escapeHTML(s.name)).join(' · ')}</span>
                        </div>
                        <div class="skills__row">
                            <span class="skills__label">Stack</span>
                            <span class="skills__value">${techStack.map(escapeHTML).join(' · ')}</span>
                        </div>
                    </div>
                </section>

                <section class="sec">
                    <h2 class="sec__title">Experience</h2>
                    <div class="exp">${jobs}</div>
                </section>

                <section class="sec">
                    <h2 class="sec__title">Open source</h2>
                    <ul class="oss">${oss}</ul>
                </section>

                <section class="sec">
                    <h2 class="sec__title">Selected writing</h2>
                    <ul class="writing">${writing}</ul>
                    <p class="writing__note">Essays on system design, AI tooling, and the developer craft — full archive at <a href="https://duthaho.dev/" target="_blank" rel="noopener">duthaho.dev</a>.</p>
                </section>
            `;
        }

        function fail(err) {
            console.error('Failed to render résumé:', err);
            document.getElementById('page').innerHTML =
                '<p style="font-family:var(--font-mono);font-size:10pt;color:var(--color-ink-2)">Could not load profile data — check that data.json is reachable. <a href="javascript:location.reload()">Reload</a>.</p>';
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => init().catch(fail));
        } else {
            init().catch(fail);
        }
    })();
    </script>
</body>
</html>
