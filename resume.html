<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résumé — Duong Thanh Hop, Solution Architect</title>
    <meta name="description" content="Résumé of Duong Thanh Hop (@duthaho) — Solution Architect, Da Nang, Vietnam.">
    <link href="favicon.ico" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tokens.css">
    <style>
    /* Blueprint · Sheet 02 (DWG DTH-002) — the résumé, cut from the same drawing
     * set as the about page and the GitHub card: blueprint-blue paper, bright ink,
     * vermilion registration codes, diamond nodes. Blueprint on screen, but
     * PRINT-FIRST (A4) and ATS-plain — the print palette flips to clean
     * black-on-white and every date/role/company is real text in source order;
     * the rail, nodes and section codes are decorative only.
     */

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
        background-color: var(--paper-2);
        /* faint console grid + phosphor vignette — screen only, echoes the sheet */
        background-image:
            radial-gradient(120% 60% at 50% -8%, var(--glow-soft), transparent 62%),
            linear-gradient(to right, color-mix(in oklab, var(--rule) 55%, transparent) 1px, transparent 1px),
            linear-gradient(to bottom, color-mix(in oklab, var(--rule) 55%, transparent) 1px, transparent 1px);
        background-size: auto, 30px 30px, 30px 30px;
        background-attachment: fixed;
        font-family: var(--font-body);
        color: var(--ink-2);
        font-size: 10.5pt;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        /* keep the one minium signal (ticks, nodes) when saved to PDF */
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
    a { color: var(--signal-2); text-decoration: none; }
    :focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: 2px; }

    /* -------- Toolbar (screen only) -------- */
    .toolbar {
        position: sticky;
        top: 0;
        z-index: var(--z-nav);
        background: color-mix(in oklab, var(--paper) 86%, transparent);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--rule-2);
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.6rem 1.1rem;
    }
    .toolbar a, .toolbar button {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-family: var(--font-body);
        font-size: 0.8125rem;
        font-weight: 500;
        line-height: 1;
        color: var(--ink);
        background: var(--paper);
        border: 1px solid var(--rule-2);
        border-radius: var(--radius-control);
        padding: 0.5rem 0.8rem;
        cursor: pointer;
        transition: border-color var(--dur-short) var(--ease-out),
                    background-color var(--dur-short) var(--ease-out);
    }
    .toolbar a:hover, .toolbar button:hover { border-color: var(--ink); }
    .toolbar .primary {
        background: var(--signal-2);
        color: var(--signal-ink);
        border-color: transparent;
    }
    .toolbar .primary:hover { background: var(--signal-deep); border-color: transparent; }
    .toolbar .hint {
        margin-left: auto;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        color: var(--ink-3);
    }

    /* -------- Sheet -------- */
    .page {
        max-width: 210mm;
        margin: 24px auto 48px;
        background: var(--paper);
        border: 1px solid var(--rule-2);
        border-radius: var(--radius-card);
        box-shadow: 0 8px 40px var(--shadow);
        padding: 16mm 17mm;
        counter-reset: sec;
    }

    /* -------- Header — title block -------- */
    .head {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 16px 24px;
        flex-wrap: wrap;
        border-bottom: 1.5px solid var(--ink);
        padding-bottom: 12px;
        margin-bottom: 14px;
    }
    .head__name {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 27pt;
        letter-spacing: -0.03em;
        line-height: 1.0;
        color: var(--ink);
        margin: 0 0 6px;
    }
    .head__role {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-family: var(--font-mono);
        font-size: 9pt;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--signal-2);
        margin: 0 0 6px;
    }
    .head__role::before {
        content: "";
        width: 7px; height: 7px;
        transform: rotate(45deg);
        background: var(--signal);
        box-shadow: 0 0 8px var(--glow);
        flex: none;
    }
    .head__sheet {
        font-family: var(--font-mono);
        font-size: 8pt;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-3);
        margin: 0;
    }
    .head__sheet::before { content: "▎"; color: var(--mark); margin-right: 0.45em; }
    .head__contact {
        text-align: right;
        font-family: var(--font-mono);
        font-size: 8.5pt;
        color: var(--ink-3);
        display: flex;
        flex-direction: column;
        gap: 3px;
        margin: 0;
    }
    .head__contact a { color: var(--ink-2); }
    .head__contact a:hover { color: var(--signal-2); }

    .head__stats {
        font-family: var(--font-mono);
        font-size: 8.5pt;
        color: var(--ink-3);
        margin: 0 0 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 4px 16px;
    }
    .head__stats span { display: inline-flex; align-items: center; gap: 6px; }
    .head__stats span::before {
        content: "";
        width: 5px; height: 5px;
        transform: rotate(45deg);
        background: var(--signal);
        flex: none;
    }
    .head__stats b {
        color: var(--ink);
        font-weight: 600;
        font-variant-numeric: tabular-nums;
    }

    /* -------- Sections -------- */
    .sec { margin-bottom: 15px; break-inside: auto; }
    .sec__title {
        counter-increment: sec;
        display: flex;
        align-items: baseline;
        gap: 0.55rem;
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 12.5pt;
        letter-spacing: -0.02em;
        color: var(--ink);
        border-bottom: 1px solid var(--rule-2);
        padding-bottom: 4px;
        margin: 0 0 9px;
        break-after: avoid;
    }
    .sec__title::before {
        content: "B·" counter(sec);
        font-family: var(--font-mono);
        font-size: 8pt;
        font-weight: 500;
        letter-spacing: 0.08em;
        color: var(--mark-2);
        flex: none;
    }

    .summary { margin: 0; color: var(--ink-2); max-width: 64em; }

    /* Skills */
    .skills { display: flex; flex-direction: column; gap: 6px; }
    .skills__row { display: flex; gap: 12px; }
    .skills__label {
        font-family: var(--font-mono);
        font-size: 8pt;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-3);
        min-width: 96px;
        padding-top: 2px;
    }
    .skills__value { font-size: 10pt; color: var(--ink); }

    /* Experience — hairline rail with a minium diamond node per role. */
    .exp {
        position: relative;
        padding-left: 22px;
    }
    .exp::before {
        content: "";
        position: absolute;
        left: 3px;
        top: 6px;
        bottom: 6px;
        width: 1px;
        background: var(--rule-2);
    }
    .job {
        position: relative;
        margin-bottom: 14px;
        break-inside: avoid;
    }
    .job:last-child { margin-bottom: 0; }
    .job::before {
        content: "";
        position: absolute;
        left: -22px;
        top: 0.34em;
        width: 8px;
        height: 8px;
        transform: rotate(45deg);
        background: var(--signal);
        box-shadow: 0 0 0 2.5px var(--paper), 0 0 9px var(--glow);
    }
    .job__head {
        display: flex;
        align-items: baseline;
        gap: 10px;
        break-after: avoid;
    }
    .job__role {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 11.5pt;
        letter-spacing: -0.02em;
        color: var(--ink);
        margin: 0;
    }
    .job__co {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 10.5pt;
        letter-spacing: -0.02em;
        color: var(--signal-2);
    }
    .job__period {
        margin-left: auto;
        font-family: var(--font-mono);
        font-size: 8.5pt;
        color: var(--ink-3);
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
    }
    .job__summary { margin: 3px 0 6px; font-size: 9.8pt; color: var(--ink-2); }
    .job__bullets { margin: 0; padding: 0; list-style: none; }
    .job__bullets li {
        font-size: 9.8pt;
        line-height: 1.45;
        padding-left: 15px;
        position: relative;
        margin-bottom: 3px;
        color: var(--ink-2);
        break-inside: avoid;
    }
    .job__bullets li::before {
        content: "";
        position: absolute;
        left: 0; top: 0.5em;
        width: 5px; height: 5px;
        transform: rotate(45deg);
        background: var(--signal);
    }
    .job__bullets strong { color: var(--ink); font-weight: 600; }
    .job__stack {
        font-family: var(--font-mono);
        font-size: 8pt;
        color: var(--ink-3);
        margin: 6px 0 0;
    }

    /* Open source & writing */
    .oss { margin: 0; padding: 0; list-style: none; }
    .oss li { margin-bottom: 6px; break-inside: avoid; }
    .oss__name { font-family: var(--font-mono); font-weight: 500; font-size: 9.5pt; color: var(--ink); }
    .oss__name::before { content: "› "; color: var(--signal); }
    .oss__name:hover { color: var(--signal-2); }
    .oss__meta { font-family: var(--font-mono); font-size: 8pt; color: var(--ink-3); margin-left: 8px; font-variant-numeric: tabular-nums; }
    .oss__desc { color: var(--ink-2); font-size: 9.5pt; }

    /* Selected writing — real articles from data.json, most recent first */
    .writing { margin: 0; padding: 0; list-style: none; }
    .writing li {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 5px;
        break-inside: avoid;
    }
    .writing li:last-child { margin-bottom: 0; }
    .writing__title {
        flex: 1 1 auto;
        color: var(--ink);
        font-size: 9.6pt;
        line-height: 1.4;
    }
    .writing__title:hover { color: var(--signal-2); }
    .writing__date {
        flex: none;
        font-family: var(--font-mono);
        font-size: 8pt;
        color: var(--ink-3);
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
        padding-top: 1px;
    }
    .writing__note {
        margin: 8px 0 0;
        font-size: 9pt;
        color: var(--ink-3);
    }

    @media (max-width: 480px) {
        .page { padding: 22px 18px; margin: 14px auto 28px; }
        .head { align-items: flex-start; }
        .head__contact { text-align: left; }
        .toolbar .hint { display: none; }
    }

    /* -------- Print — flip the whole token set to clean black-on-white ATS ink -------- */
    @page { size: A4; margin: 0; }
    @media print {
        :root {
            --paper:      #ffffff;
            --paper-2:    #ffffff;
            --paper-3:    #f4f4f5;
            --ink:        #14161a;
            --ink-2:      #33373d;
            --ink-3:      #63676d;
            --rule:       #dddfe3;
            --rule-2:     #b9bcc2;
            --signal:      #0e6e78;  /* printable teal — decorative diamonds */
            --signal-2:    #0b5a63;  /* link text, dark enough to read on white */
            --signal-deep: #094a52;
            --signal-soft: rgba(14, 110, 120, 0.10);
            --signal-line: rgba(14, 110, 120, 0.30);
            --glow:        transparent;
            --glow-soft:   transparent;
            --shadow:      transparent;
            /* section codes / ticks: keep dark for ATS, not vermilion */
            --mark:        #14161a;
            --mark-2:      #14161a;
            --mark-soft:   rgba(20, 22, 26, 0.08);
            --mark-line:   #b9bcc2;
            --leader:      #c9ccd1;
        }
        body {
            background: #fff;
            background-image: none;
            color: var(--ink-2);
        }
        .toolbar { display: none; }
        .page {
            max-width: none;
            width: 100%;
            margin: 0;
            border: none;
            border-radius: 0;
            box-shadow: none;
            padding: 14mm 16mm;
        }
        a { color: inherit; }
    }

    @media (prefers-reduced-motion: reduce) {
        * { transition-duration: 0ms !important; }
    }
    </style>
</head>
<body>

    <nav class="toolbar" aria-label="Résumé actions">
        <a href="index.html">← Profile</a>
        <button class="primary" type="button" onclick="window.print()">Download PDF</button>
        <span class="hint">Tip: choose “Save as PDF” in the print dialog</span>
    </nav>

    <main class="page" id="page"></main>

    <script>
    (function () {
        'use strict';

        const EMAIL = 'hopit.bkdn@gmail.com';

        function escapeHTML(s) {
            return String(s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        const stripTags = (s) => String(s).replace(/<[^>]+>/g, '');
        const bare = (url) => String(url).replace(/^https?:\/\//, '').replace(/\/$/, '');
        const enDash = (s) => String(s).replace(/\s*-\s*/g, '–');
        const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        function monthYear(iso) {
            const d = new Date(iso);
            return Number.isNaN(d.getTime()) ? '' : `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
        }

        async function init() {
            const res = await fetch('data.json');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const { personal, stats, coreSkills, techStack, experience, projects, articles = [], social, footer = {} } = data;

            document.title = `Résumé — ${personal.name}, ${personal.title}`;

            const rev = `${footer.year || new Date().getFullYear()}.07`;

            const contact = [
                `<span>${escapeHTML(personal.location)}</span>`,
                `<a href="mailto:${EMAIL}">${EMAIL}</a>`,
                ...social.map(l => `<a href="${escapeHTML(l.url)}" target="_blank" rel="noopener">${escapeHTML(bare(l.url))}</a>`)
            ].join('');

            const statsLine = stats
                .map(s => `<span><b>${escapeHTML(s.value)}</b> ${escapeHTML(s.label)}</span>`)
                .join('');

            const summary = stripTags(personal.about.paragraphs[0]);

            const jobs = experience.map(job => `
                <article class="job">
                    <div class="job__head">
                        <h3 class="job__role">${escapeHTML(job.title)}</h3>
                        <span class="job__co">${escapeHTML(job.company)}</span>
                        <span class="job__period">${escapeHTML(enDash(job.period))}</span>
                    </div>
                    <p class="job__summary">${escapeHTML(job.summary)}</p>
                    <ul class="job__bullets">
                        ${(job.achievements || []).map(a => `<li>${a}</li>`).join('')}
                    </ul>
                    <p class="job__stack">${(job.stack || []).map(escapeHTML).join(' · ')}</p>
                </article>
            `).join('');

            const oss = projects.slice(0, 3).map(p => {
                const meta = [p.stars ? `${p.stars} stars` : '', p.forks ? `${p.forks} forks` : '']
                    .filter(Boolean).join(' · ');
                return `
                <li>
                    <a class="oss__name" href="${escapeHTML(p.url)}" target="_blank" rel="noopener">${escapeHTML(p.name)}</a>
                    <span class="oss__meta">${escapeHTML(meta)}</span>
                    <span class="oss__desc">— ${escapeHTML(p.description)}</span>
                </li>`;
            }).join('');

            const writing = articles.slice(0, 3).map(a => `
                <li>
                    <a class="writing__title" href="${escapeHTML(a.url)}" target="_blank" rel="noopener">${escapeHTML(a.title)}</a>
                    <span class="writing__date">${escapeHTML(monthYear(a.date))}</span>
                </li>`).join('');

            document.getElementById('page').innerHTML = `
                <header class="head">
                    <div>
                        <h1 class="head__name">${escapeHTML(personal.name)}</h1>
                        <p class="head__role">${escapeHTML(personal.title)}</p>
                        <p class="head__sheet">DWG NO. DTH-002 · Sheet 02 — Résumé · REV ${escapeHTML(rev)}</p>
                    </div>
                    <p class="head__contact">${contact}</p>
                </header>

                <p class="head__stats">${statsLine}</p>

                <section class="sec">
                    <h2 class="sec__title">Summary</h2>
                    <p class="summary">${escapeHTML(summary)}</p>
                </section>

                <section class="sec">
                    <h2 class="sec__title">Skills</h2>
                    <div class="skills">
                        <div class="skills__row">
                            <span class="skills__label">Core</span>
                            <span class="skills__value">${coreSkills.map(s => escapeHTML(s.name)).join(' · ')}</span>
                        </div>
                        <div class="skills__row">
                            <span class="skills__label">Stack</span>
                            <span class="skills__value">${techStack.map(escapeHTML).join(' · ')}</span>
                        </div>
                    </div>
                </section>

                <section class="sec">
                    <h2 class="sec__title">Experience</h2>
                    <div class="exp">${jobs}</div>
                </section>

                <section class="sec">
                    <h2 class="sec__title">Open source</h2>
                    <ul class="oss">${oss}</ul>
                </section>

                <section class="sec">
                    <h2 class="sec__title">Selected writing</h2>
                    <ul class="writing">${writing}</ul>
                    <p class="writing__note">Essays on system design, AI tooling, and the developer craft — full archive at <a href="https://duthaho.dev/" target="_blank" rel="noopener">duthaho.dev</a>.</p>
                </section>
            `;
        }

        function fail(err) {
            console.error('Failed to render résumé:', err);
            document.getElementById('page').innerHTML =
                '<p style="font-family:var(--font-mono);font-size:10pt;color:var(--ink-2)">Could not load profile data — check that data.json is reachable. <a href="javascript:location.reload()">Reload</a>.</p>';
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => init().catch(fail));
        } else {
            init().catch(fail);
        }
    })();
    </script>
</body>
</html>
